<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sea Diary: Match Edition</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; /* Deep Navy */
            color: #ffffff;
            -webkit-user-select: none;
            user-select: none;
            overflow-x: hidden;
        }
        .text-amber { color: #f59e0b; }
        .bg-amber { background-color: #f59e0b; }
        
        /* Remove native browser arrows from number inputs so text centers perfectly */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }

        .atm-btn {
            background: #1e293b;
            border: 2px solid #334155;
            border-radius: 12px;
            font-size: 2rem;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 80px;
            transition: background 0.1s;
        }
        .atm-btn:active { background: #f59e0b; color: #0f172a; }
        
        /* Hype Animation */
        @keyframes pulse-ring {
            0% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(245, 158, 11, 0); }
            100% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); }
        }
        .hype-number {
            font-size: 8rem;
            font-weight: 900;
            color: #f59e0b;
            animation: pulse-ring 1s infinite;
            border-radius: 50%;
        }
        
        /* Slide drawers */
        .drawer {
            transition: transform 0.3s ease-in-out;
            transform: translateX(100%);
        }
        .drawer.open { transform: translateX(0); }
        
        .hidden { display: none !important; }
    </style>
</head>
<body class="h-screen w-screen flex flex-col">

    <div id="view-home" class="flex-1 flex flex-col p-6 items-center justify-center space-y-6">
        <div class="text-center">
            <i class="fa-solid fa-stopwatch text-amber text-6xl mb-2"></i>
            <h1 class="text-3xl font-black tracking-tight mb-1">MATCH EDITION</h1>
            <div class="text-slate-500 font-bold text-sm tracking-widest">v1.1</div>
        </div>
        
        <div class="w-full max-w-sm space-y-4 pt-4">
            <input type="text" id="playerName" placeholder="Enter Your Name" class="w-full bg-slate-800 border-2 border-slate-600 text-white font-bold text-xl rounded-xl p-4 text-center focus:border-amber focus:outline-none">
            
            <button onclick="navTo('join')" class="w-full bg-green-600 hover:bg-green-500 text-white font-black text-2xl py-6 rounded-xl shadow-lg uppercase tracking-wide">
                Join Match
            </button>
            
            <div class="flex space-x-4 pt-2">
                <button onclick="navTo('host')" class="flex-1 bg-slate-800 text-slate-300 font-bold py-4 rounded-xl text-sm border border-slate-700 active:bg-slate-700">
                    <i class="fa-solid fa-crown mr-2"></i> Host
                </button>
                <button onclick="navTo('history')" class="flex-1 bg-slate-800 text-slate-300 font-bold py-4 rounded-xl text-sm border border-slate-700 active:bg-slate-700">
                    <i class="fa-solid fa-book mr-2"></i> History
                </button>
            </div>

            <button onclick="forceUpdateApp()" class="w-full flex items-center justify-center space-x-2 bg-transparent text-slate-500 border border-slate-700 font-bold py-3 rounded-xl mt-6 active:text-amber active:border-amber transition">
                <i class="fa-solid fa-rotate" id="updateSpinner"></i>
                <span>Update App & Reset</span>
            </button>
        </div>
    </div>

    <div id="view-join" class="hidden flex-1 flex flex-col p-4 bg-slate-900">
        <div class="text-center pt-8 pb-4">
            <h2 class="text-amber font-bold text-xl mb-2">ENTER MATCH PIN</h2>
            <div class="flex justify-center space-x-2">
                <div class="w-16 h-20 bg-slate-800 border-b-4 border-amber rounded flex items-center justify-center text-4xl font-black pin-digit" id="pin-1"></div>
                <div class="w-16 h-20 bg-slate-800 border-b-4 border-amber rounded flex items-center justify-center text-4xl font-black pin-digit" id="pin-2"></div>
                <div class="w-16 h-20 bg-slate-800 border-b-4 border-amber rounded flex items-center justify-center text-4xl font-black pin-digit" id="pin-3"></div>
                <div class="w-16 h-20 bg-slate-800 border-b-4 border-amber rounded flex items-center justify-center text-4xl font-black pin-digit" id="pin-4"></div>
            </div>
        </div>
        
        <div class="flex-1 grid grid-cols-3 gap-3 p-4 max-w-sm mx-auto w-full content-center">
            <button class="atm-btn" onclick="atmPress(1)">1</button>
            <button class="atm-btn" onclick="atmPress(2)">2</button>
            <button class="atm-btn" onclick="atmPress(3)">3</button>
            <button class="atm-btn" onclick="atmPress(4)">4</button>
            <button class="atm-btn" onclick="atmPress(5)">5</button>
            <button class="atm-btn" onclick="atmPress(6)">6</button>
            <button class="atm-btn" onclick="atmPress(7)">7</button>
            <button class="atm-btn" onclick="atmPress(8)">8</button>
            <button class="atm-btn" onclick="atmPress(9)">9</button>
            <button class="atm-btn text-red-500 text-xl" onclick="navTo('home')"><i class="fa-solid fa-xmark"></i></button>
            <button class="atm-btn" onclick="atmPress(0)">0</button>
            <button class="atm-btn text-amber text-xl" onclick="atmDelete()"><i class="fa-solid fa-delete-left"></i></button>
        </div>
        <button id="btn-connect" onclick="connectToMatch()" class="hidden w-full max-w-sm mx-auto bg-blue-600 text-white font-black text-2xl py-5 rounded-xl mb-8">CONNECT</button>
    </div>

    <div id="view-host" class="hidden flex-1 flex flex-col p-6 space-y-6">
        <div class="flex justify-between items-center border-b border-slate-700 pb-4">
            <button onclick="navTo('home')" class="text-slate-400 text-2xl"><i class="fa-solid fa-arrow-left"></i></button>
            <h2 class="text-xl font-bold">Match Setup</h2>
            <div class="w-6"></div>
        </div>
        
        <div class="space-y-4">
            <label class="block text-amber font-bold">Match Duration (Hours)</label>
            <input type="number" id="hostDuration" value="4" class="w-full bg-slate-800 border-2 border-slate-600 p-4 rounded-xl text-xl font-bold focus:border-amber text-center">
            
            <label class="block text-amber font-bold pt-4">Scoring Format</label>
            <select id="hostFormat" class="w-full bg-slate-800 border-2 border-slate-600 p-4 rounded-xl text-xl font-bold focus:border-amber appearance-none">
                <option value="length">Length Only (cm)</option>
                <option value="length10">Length + 10 Pts</option>
                <option value="weightLb">Weight (Lbs & Oz)</option>
                <option value="weightKg">Weight (Kg)</option>
            </select>
            
            <button onclick="createMatch()" class="w-full bg-amber text-slate-900 font-black text-2xl py-6 rounded-xl mt-8 shadow-lg">CREATE MATCH</button>
        </div>
    </div>

    <div id="view-waiting" class="hidden flex-1 flex flex-col p-6 justify-center items-center text-center space-y-8">
        <h2 class="text-slate-400 font-bold uppercase tracking-widest text-sm">Room PIN</h2>
        <div class="text-7xl font-black text-white tracking-widest bg-slate-800 py-4 px-8 rounded-2xl border-2 border-slate-600" id="displayPin">0000</div>
        
        <div id="hostControls" class="hidden w-full max-w-sm pt-8">
            <p class="text-amber mb-4 font-bold"><i class="fa-solid fa-users mr-2"></i> Waiting for anglers...</p>
            <button onclick="triggerHypeStart()" class="w-full bg-red-600 hover:bg-red-500 text-white font-black text-2xl py-6 rounded-xl animate-pulse">
                🚨 START MATCH NOW
            </button>
        </div>
        <div id="joinerWaitingText" class="w-full max-w-sm pt-8">
            <p class="text-xl font-bold text-slate-300">Waiting for Marshal to blow the whistle...</p>
            <i class="fa-solid fa-spinner fa-spin text-4xl text-amber mt-8"></i>
        </div>
    </div>

    <div id="view-hype" class="hidden flex-1 flex items-center justify-center bg-black">
        <div id="hypeCount" class="hype-number flex items-center justify-center w-64 h-64">10</div>
    </div>

    <div id="view-fishing" class="hidden flex-1 flex flex-col relative pb-16">
        
        <div class="bg-slate-900 border-b border-slate-700 px-4 py-3 flex justify-between items-center z-10">
            <div class="flex items-center space-x-3">
                <div class="w-3 h-3 bg-red-500 rounded-full animate-pulse"></div>
                <div class="text-xl font-black tabular-nums tracking-widest" id="mainTimer">04:00:00</div>
            </div>
            <button id="wakeLockBtn" onclick="toggleWakeLock()" class="text-slate-400 border border-slate-600 px-3 py-1 rounded text-sm font-bold active:bg-slate-700">
                <i class="fa-solid fa-moon"></i> Sleep
            </button>
        </div>
        
        <div id="statusBanner" class="hidden bg-red-600 text-white text-center font-bold py-2 uppercase tracking-wide text-sm z-10">
            Match Over - 10 Min Grace Period
        </div>

        <div id="loggingArea" class="flex-1 p-4 space-y-4 overflow-y-auto">
            
            <label class="block text-slate-400 font-bold text-sm uppercase">Species</label>
            <select id="inputSpecies" class="w-full bg-slate-800 border-2 border-slate-600 p-5 rounded-xl text-2xl font-bold appearance-none text-white">
                <optgroup label="Roundfish">
                    <option value="Cod">Cod</option>
                    <option value="Whiting">Whiting</option>
                    <option value="Haddock">Haddock</option>
                    <option value="Pollock">Pollock</option>
                    <option value="Coalfish">Coalfish (Saithe)</option>
                    <option value="Bass">Bass</option>
                    <option value="Ling">Ling</option>
                    <option value="Pouting">Pouting</option>
                </optgroup>
                <optgroup label="Flatfish">
                    <option value="Flounder">Flounder</option>
                    <option value="Plaice">Plaice</option>
                    <option value="Dab">Dab</option>
                    <option value="Turbot">Turbot</option>
                    <option value="Brill">Brill</option>
                    <option value="Dover Sole">Dover Sole</option>
                    <option value="Lemon Sole">Lemon Sole</option>
                </optgroup>
                <optgroup label="Sharks & Rays">
                    <option value="Lesser Spotted Dogfish">Lesser Spotted Dogfish</option>
                    <option value="Bull Huss">Bull Huss</option>
                    <option value="Smoothhound">Smoothhound</option>
                    <option value="Tope">Tope</option>
                    <option value="Thornback Ray">Thornback Ray</option>
                    <option value="Spotted Ray">Spotted Ray</option>
                    <option value="Blonde Ray">Blonde Ray</option>
                </optgroup>
                <optgroup label="Pelagics">
                    <option value="Mackerel">Mackerel</option>
                    <option value="Herring">Herring</option>
                    <option value="Garfish">Garfish</option>
                    <option value="Scad">Scad</option>
                </optgroup>
                <optgroup label="Others/Mini-Species">
                    <option value="Ballan Wrasse">Ballan Wrasse</option>
                    <option value="Corkwing Wrasse">Corkwing Wrasse</option>
                    <option value="Conger Eel">Conger Eel</option>
                    <option value="Grey Gurnard">Grey Gurnard</option>
                    <option value="Tub Gurnard">Tub Gurnard</option>
                    <option value="Rockling">Rockling</option>
                </optgroup>
            </select>

            <label class="block text-slate-400 font-bold text-sm uppercase pt-2" id="labelSize">Size</label>
            <div class="flex space-x-2">
                <input type="number" id="inputSize" inputmode="decimal" class="flex-1 bg-slate-800 border-2 border-slate-600 p-5 rounded-xl text-4xl font-black text-center text-white focus:border-blue-500 outline-none placeholder-slate-600" placeholder="0">
                <button onclick="adjustSize(1)" class="w-20 bg-slate-700 rounded-xl text-3xl font-black text-slate-300 active:bg-slate-600">+</button>
                <button onclick="adjustSize(-1)" class="w-20 bg-slate-700 rounded-xl text-3xl font-black text-slate-300 active:bg-slate-600">-</button>
            </div>

            <button id="btnRecord" onclick="recordCatch()" class="w-full bg-blue-600 active:bg-blue-500 text-white font-black text-3xl py-8 rounded-xl shadow-lg mt-4">
                RECORD CATCH
            </button>

            <div class="pt-6 pb-20">
                <h3 class="text-slate-500 font-bold text-sm uppercase mb-2">My Log (Tap to Edit)</h3>
                <div id="localCatchList" class="space-y-2">
                    </div>
            </div>
        </div>

        <div class="absolute bottom-20 right-4 z-20">
            <button id="btnMarshalPanel" onclick="document.getElementById('marshalDrawer').classList.add('open')" class="hidden bg-slate-700 text-white w-14 h-14 rounded-full shadow-lg text-
